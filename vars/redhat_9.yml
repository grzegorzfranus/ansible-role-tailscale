---
# =============================================================================
# Ansible Role: Tailscale - RedHat 9 (EL9) Variables
# =============================================================================
# OS-specific internal constants and computed values.
# These are NOT user-overridable. All use double-underscore prefix per CoP §3.1.4.
# =============================================================================

__tailscale_os_repo_url: "https://pkgs.tailscale.com/{{ tailscale_track }}/rhel/9/tailscale.repo"
__tailscale_os_repo_key_url: "https://pkgs.tailscale.com/{{ tailscale_track }}/rhel/9/repo.gpg"
__tailscale_os_repo_key_path: "/etc/pki/rpm-gpg/tailscale-repo.gpg"

# OS-specific prerequisite packages (internal)
__tailscale_os_prerequisites:
  - dnf-plugins-core

# Logging defaults for EL9 (rsyslog user/group differs from Debian)
__tailscale_os_log_user: "root"
__tailscale_os_log_group: "root"
__tailscale_os_syslog_path: "/var/log/messages"
