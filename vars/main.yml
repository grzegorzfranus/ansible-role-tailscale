---
# Ansible Role: Tailscale - Internal constants and computed values
# These are NOT user-overridable. All use double-underscore prefix per CoP §3.1.4.

# Service name — constant across all supported distributions
__tailscale_service_name: "tailscaled"

# Repository configuration — dynamic fallback for unsupported OS variants.
# OS-specific files (debian_12.yml, ubuntu_24.04.yml, etc.) override these.
__tailscale_os_repo_key_path: "/usr/share/keyrings/tailscale-archive-keyring.gpg"

__tailscale_os_repo_key_url: >-
  https://pkgs.tailscale.com/{{ tailscale_track }}/{{ ansible_facts['distribution'] | lower }}/{{-
  __tailscale_version_codename | default(ansible_facts['distribution_release']) }}.{%-
  if (__tailscale_detected_key_method | default('keyring')) == 'keyring' -%}
  noarmor.gpg{%- else -%} asc{%- endif -%}

__tailscale_os_repo_list_url: >-
  https://pkgs.tailscale.com/{{ tailscale_track }}/{{ ansible_facts['distribution'] | lower }}/{{-
  __tailscale_version_codename | default(ansible_facts['distribution_release']) }}.{%-
  if (__tailscale_detected_key_method | default('keyring')) == 'keyring' -%}
  tailscale-keyring.list{%- else -%} list{%- endif -%}

# OS-specific prerequisite packages fallback (empty — user's defaults/main.yml are used)
__tailscale_os_prerequisites: []

# Smart detection defaults (populated by validate tasks at runtime)
__tailscale_detected_key_method: "{{ tailscale_apt_key_type }}"
__tailscale_detected_immediate_start: "{{ tailscale_systemctl_start }}"
__tailscale_version_codename: "{{ ansible_facts['distribution_release'] }}"

# System detection
__tailscale_system_detection:
  os_family: "{{ ansible_facts['os_family'] }}"
  distribution: "{{ ansible_facts['distribution'] }}"
  version: "{{ ansible_facts['distribution_version'] }}"
  major_version: "{{ ansible_facts['distribution_major_version'] }}"
  codename: "{{ ansible_facts['distribution_release'] }}"
  architecture: "{{ ansible_facts['architecture'] }}"
  kernel: "{{ ansible_facts['kernel'] }}"
  package_manager: "{{ ansible_facts['pkg_mgr'] }}"
  service_manager: "{{ ansible_facts['service_mgr'] }}"

# Supported architectures
__tailscale_supported_architectures:
  - "x86_64"
  - "aarch64"
  - "armv7l"
  - "arm64"

# Supported package managers
__tailscale_supported_package_managers:
  - "apt"

# Diagnostic info for error reporting
__tailscale_diagnostic_info:
  role_version: "1.4.0"
  execution_timestamp: "{{ ansible_facts['date_time'].iso8601 }}"
  ansible_version: "{{ ansible_version.full }}"
  target_host: "{{ inventory_hostname }}"
  connection_type: "{{ ansible_connection }}"
  python_version: "{{ ansible_facts['python_version'] }}"

# Network diagnostic endpoints
__tailscale_connectivity_endpoints:
  repository: "https://pkgs.tailscale.com"
  api: "https://api.tailscale.com"
  login: "https://login.tailscale.com"

# Log file locations
__tailscale_log_locations:
  systemd: "/var/log/tailscaled.log"
  journal: "journalctl -u tailscaled"
  syslog: "/var/log/syslog"
