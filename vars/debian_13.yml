---
# =============================================================================
# Ansible Role: Tailscale - Debian 13 (Trixie) Variables
# =============================================================================
# Variables specific to Debian 13 (Trixie) for Tailscale installation
# =============================================================================

# Repository configuration
tailscale_repo_key_url: "https://pkgs.tailscale.com/stable/debian/trixie.noarmor.gpg"
tailscale_repo_key_path: "/usr/share/keyrings/tailscale-archive-keyring.gpg"
tailscale_repo_list_url: "https://pkgs.tailscale.com/stable/debian/trixie.tailscale-keyring.list"

# Service configuration
tailscale_service_name: "tailscaled"

# Required packages
tailscale_prerequisites:
  - curl
  - gnupg
  - apt-transport-https
  - ca-certificates
