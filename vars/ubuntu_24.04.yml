---
# Ansible Role: Tailscale - Ubuntu 24.04 (Noble) OS-specific constants

# Repository configuration (internal, not user-overridable)
__tailscale_os_repo_key_url: "https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg"
__tailscale_os_repo_key_path: "/usr/share/keyrings/tailscale-archive-keyring.gpg"
__tailscale_os_repo_list_url: "https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list"

# OS-specific prerequisite packages (internal)
__tailscale_os_prerequisites:
  - apt-transport-https
  - ca-certificates
