---
# Tailscale Molecule — Converge for default scenario.

- name: Molecule | Converge
  hosts: all

  pre_tasks:
    - name: Converge | Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      changed_when: false
      when:
        - ansible_facts['os_family'] == "Debian"

    - name: Converge | Wait for systemd to complete initialization
      ansible.builtin.systemd:
        name: multi-user.target
        state: started
      register: systemctl_status
      until: true
      retries: 30
      delay: 5
      when:
        - ansible_facts['service_mgr'] == 'systemd'
      changed_when: false
      failed_when: false

  vars:
    tailscale_auth_key: ""
    tailscale_enhanced_error_reporting: true
    tailscale_collect_system_info: true
    tailscale_track: "stable"
    tailscale_service_enabled: true
    tailscale_validate_connectivity: false

  roles:
    - role: ../../..

  post_tasks:
    - name: Converge | Display role execution summary
      ansible.builtin.debug:
        msg: "Tailscale role execution completed"
