---
# Tailscale Molecule — Verify default scenario results.

- name: Molecule | Verify Role
  hosts: all
  gather_facts: true

  tasks:
    # --- Debian package verification ---
    - name: Verify | Check if Tailscale package is installed (dpkg)
      ansible.builtin.command: "dpkg -l tailscale"
      register: __verify_package_check
      failed_when: false
      changed_when: false
      when:
        - ansible_facts['pkg_mgr'] == 'apt'

    - name: Verify | Assert Tailscale package is installed (dpkg)
      ansible.builtin.assert:
        that:
          - __verify_package_check['rc'] == 0
          - "'tailscale' in __verify_package_check['stdout']"
        fail_msg: "Tailscale package is not installed"
        success_msg: "Tailscale package installation verified"
      when:
        - ansible_facts['pkg_mgr'] == 'apt'

    - name: Verify | Check if Tailscale repository is configured (apt)
      ansible.builtin.find:
        paths: "/etc/apt/sources.list.d"
        patterns: "*tailscale*"
      register: __verify_repo_files
      when:
        - ansible_facts['pkg_mgr'] == 'apt'

    - name: Verify | Assert repository configuration exists (apt)
      ansible.builtin.assert:
        that:
          - __verify_repo_files['files'] | length > 0
        fail_msg: "Tailscale repository configuration not found"
        success_msg: "Tailscale repository configuration verified"
      when:
        - ansible_facts['pkg_mgr'] == 'apt'

    # --- RedHat package verification ---
    - name: Verify | Check if Tailscale package is installed (rpm)
      ansible.builtin.command: "rpm -q tailscale"
      register: __verify_rpm_check
      failed_when: false
      changed_when: false
      when:
        - ansible_facts['pkg_mgr'] == 'dnf'

    - name: Verify | Assert Tailscale package is installed (rpm)
      ansible.builtin.assert:
        that:
          - __verify_rpm_check['rc'] == 0
        fail_msg: "Tailscale RPM package is not installed"
        success_msg: "Tailscale RPM package installation verified"
      when:
        - ansible_facts['pkg_mgr'] == 'dnf'

    - name: Verify | Check if Tailscale repository is configured (dnf)
      ansible.builtin.find:
        paths: "/etc/yum.repos.d"
        patterns: "*tailscale*"
      register: __verify_dnf_repo_files
      when:
        - ansible_facts['pkg_mgr'] == 'dnf'

    - name: Verify | Assert repository configuration exists (dnf)
      ansible.builtin.assert:
        that:
          - __verify_dnf_repo_files['files'] | length > 0
        fail_msg: "Tailscale DNF repository configuration not found"
        success_msg: "Tailscale DNF repository configuration verified"
      when:
        - ansible_facts['pkg_mgr'] == 'dnf'

    # --- Common binary verification ---
    - name: Verify | Check if Tailscale client binary exists
      ansible.builtin.stat:
        path: "/usr/bin/tailscale"
      register: __verify_client_binary

    - name: Verify | Assert client binary exists and is executable
      ansible.builtin.assert:
        that:
          - __verify_client_binary['stat']['exists']
          - __verify_client_binary['stat']['executable']
        fail_msg: "Tailscale client binary not found or not executable"
        success_msg: "Tailscale client binary verified"

    - name: Verify | Check if Tailscale daemon binary exists
      ansible.builtin.stat:
        path: "/usr/sbin/tailscaled"
      register: __verify_daemon_binary

    - name: Verify | Assert daemon binary exists and is executable
      ansible.builtin.assert:
        that:
          - __verify_daemon_binary['stat']['exists']
          - __verify_daemon_binary['stat']['executable']
        fail_msg: "Tailscale daemon binary not found or not executable"
        success_msg: "Tailscale daemon binary verified"

    - name: Verify | Test Tailscale client functionality
      ansible.builtin.command: "/usr/bin/tailscale version"
      register: __verify_version_check
      changed_when: false

    - name: Verify | Show Tailscale version
      ansible.builtin.debug:
        msg: "Tailscale version: {{ __verify_version_check['stdout'] }}"

    - name: Verify | Check if Tailscale service file exists (Debian)
      ansible.builtin.stat:
        path: "/lib/systemd/system/tailscaled.service"
      register: __verify_service_file_debian
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - ansible_facts['os_family'] == 'Debian'

    - name: Verify | Check if Tailscale service file exists (RedHat)
      ansible.builtin.stat:
        path: "/usr/lib/systemd/system/tailscaled.service"
      register: __verify_service_file_redhat
      when:
        - ansible_facts['service_mgr'] == 'systemd'
        - ansible_facts['os_family'] == 'RedHat'

    - name: Verify | Assert service file exists
      ansible.builtin.assert:
        that:
          - >-
            (__verify_service_file_debian['stat']['exists'] | default(false)) or
            (__verify_service_file_redhat['stat']['exists'] | default(false))
        fail_msg: "Tailscale service file not found"
        success_msg: "Tailscale service file verified"
      when:
        - ansible_facts['service_mgr'] == 'systemd'

    - name: Verify | All checks completed successfully
      ansible.builtin.debug:
        msg: "All Tailscale verification checks passed"
