---
name: "Publish"

on:
  release:
    types: [published]

jobs:
  # ================================================================
  # PUBLISH TO ANSIBLE GALAXY
  # ----------------------------------------------------------------
  # Triggered when Release Please creates a GitHub Release.
  # Pre-publish lint is disabled — CI already validated the code.
  # ================================================================
  publish:
    uses: grzegorzfranus/github-actions-workflows/.github/workflows/ansible-publish-galaxy.yml@main
    secrets:
      galaxy-api-key: ${{ secrets.GALAXY_API_KEY }}
