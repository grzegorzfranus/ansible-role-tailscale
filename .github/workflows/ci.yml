---
name: CI

run-name: "CI: ${{ github.event.pull_request.title || github.ref_name }} by @${{ github.actor }}"

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  branch-name-lint:
    name: "🔍 Validate Branch Naming"
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: "🔍 Validate branch name"
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          PATTERN='^(feature|bugfix|fix|hotfix|release|chore|docs|refactor|test|build|ci|perf|revert)/[a-zA-Z0-9-]+$|^release-please--.*$|^dependabot/.+$'
          if [[ ! "$BRANCH_NAME" =~ $PATTERN ]]; then
            echo "::error::Branch name '$BRANCH_NAME' does not match: $PATTERN"
            exit 1
          fi

  pr-title-lint:
    name: "🔍 Validate PR Title Format"
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: "🔍 Validate PR title"
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-zA-Z0-9_-]+\))?!?: .+$'
          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title '$TITLE' does not match Conventional Commits format: $PATTERN"
            exit 1
          fi

  ci:
    needs: [branch-name-lint, pr-title-lint]
    if: github.event.pull_request.draft == false
    uses: grzegorzfranus/github-workflows/.github/workflows/ansible-ci.yml@v3.0.1
    with:
      molecule-distros: '["ubuntu2604", "ubuntu2404", "debian13", "debian12", "rockylinux9"]'

  merge-check:
    name: "Merge Check Gate"
    if: always() && github.event.pull_request.draft == false
    needs: [branch-name-lint, pr-title-lint, ci]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: "⚙️ Evaluate results"
        env:
          BRANCH_NAME_LINT_RESULT: ${{ needs.branch-name-lint.result }}
          PR_TITLE_LINT_RESULT: ${{ needs.pr-title-lint.result }}
          CI_RESULT: ${{ needs.ci.result }}
        run: |
          echo "Branch name lint: $BRANCH_NAME_LINT_RESULT"
          echo "PR title lint: $PR_TITLE_LINT_RESULT"
          echo "CI result: $CI_RESULT"
          has_failures=0
          for RESULT in "$BRANCH_NAME_LINT_RESULT" "$PR_TITLE_LINT_RESULT" "$CI_RESULT"; do
            if [[ "$RESULT" == "failure" || "$RESULT" == "cancelled" ]]; then
              has_failures=1
            fi
          done
          if [[ "$has_failures" -eq 1 ]]; then
            echo "::error::One or more checks failed or were cancelled"
            exit 1
          fi
          echo "All checks passed"
