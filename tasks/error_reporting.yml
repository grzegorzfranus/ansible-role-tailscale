---
# Tailscale Error Reporting — Comprehensive diagnostic collection for troubleshooting.

- name: Tailscale | error | Collect current error context
  ansible.builtin.set_fact:
    __tailscale_error_report:
      report_timestamp: "{{ ansible_facts['date_time'].iso8601 }}"
      role_version: "{{ __tailscale_diagnostic_info.role_version }}"
      failed_task: "{{ ansible_failed_task.name | default('Unknown task') }}"
      error_message: "{{ ansible_failed_result.msg | default('No error message available') }}"
      playbook_dir: "{{ playbook_dir | default('unknown') }}"
      inventory_hostname: "{{ inventory_hostname }}"

- name: Tailscale | error | Collect comprehensive system diagnostics
  ansible.builtin.set_fact:
    __tailscale_system_diagnostics:
      os_info:
        distribution: "{{ ansible_facts['distribution'] }}"
        version: "{{ ansible_facts['distribution_version'] }}"
        codename: "{{ ansible_facts['distribution_release'] }}"
        major_version: "{{ ansible_facts['distribution_major_version'] }}"
        os_family: "{{ ansible_facts['os_family'] }}"
        kernel: "{{ ansible_facts['kernel'] }}"
        architecture: "{{ ansible_facts['architecture'] }}"
      hardware_info:
        memory_total_mb: "{{ ansible_facts['memtotal_mb'] | default('unknown') }}"
        memory_free_mb: "{{ ansible_facts['memfree_mb'] | default('unknown') }}"
        cpu_cores: "{{ ansible_facts['processor_vcpus'] | default('unknown') }}"
        cpu_model: "{{ ansible_facts['processor'][2] | default('unknown') }}"
        virtualization_type: "{{ ansible_facts['virtualization_type'] | default('physical') }}"
        virtualization_role: "{{ ansible_facts['virtualization_role'] | default('host') }}"
      system_config:
        hostname: "{{ ansible_facts['hostname'] }}"
        fqdn: "{{ ansible_facts['fqdn'] }}"
        timezone: "{{ ansible_facts['date_time'].tz }}"
        uptime_seconds: "{{ ansible_facts['uptime_seconds'] | default('unknown') }}"
        selinux_status: "{{ ansible_facts['selinux'].status | default('unknown') }}"
        python_version: "{{ ansible_facts['python_version'] }}"
      detected_config:
        key_method: "{{ __tailscale_detected_key_method | default('not_detected') }}"
        immediate_start: "{{ __tailscale_detected_immediate_start | default('not_detected') }}"

- name: Tailscale | error | Collect package manager information
  ansible.builtin.set_fact:
    __tailscale_package_diagnostics:
      package_manager: "{{ ansible_facts['pkg_mgr'] }}"
      package_manager_available: "{{ __tailscale_pkg_mgr_check.rc == 0 if __tailscale_pkg_mgr_check is defined else 'unknown' }}"
      prerequisites_status: "{{ __tailscale_pkg_test.changed if __tailscale_pkg_test is defined else 'unknown' }}"
  when:
    - tailscale_include_package_info | bool

- name: Tailscale | error | Check current repository configuration
  ansible.builtin.find:
    paths: "/etc/apt/sources.list.d"
    patterns: "*tailscale*"
  register: __tailscale_existing_repos
  failed_when: false
  when:
    - tailscale_include_package_info | bool
    - ansible_facts['pkg_mgr'] == 'apt'

- name: Tailscale | error | Check GPG keys
  ansible.builtin.find:
    paths: "/usr/share/keyrings"
    patterns: "*tailscale*"
  register: __tailscale_existing_keys
  failed_when: false
  when:
    - tailscale_include_package_info | bool
    - ansible_facts['pkg_mgr'] == 'apt'

- name: Tailscale | error | Collect network configuration
  ansible.builtin.set_fact:
    __tailscale_network_diagnostics:
      default_ipv4: "{{ ansible_default_ipv4 | default({}) }}"
      default_ipv6: "{{ ansible_default_ipv6 | default({}) }}"
      all_interfaces: "{{ ansible_interfaces | default([]) }}"
      dns_nameservers: "{{ ansible_dns.nameservers | default([]) }}"
      dns_search: "{{ ansible_dns.search | default([]) }}"
      repository_connectivity: "{{ __tailscale_repo_connectivity.status | default('not_tested') if __tailscale_repo_connectivity is defined else 'not_tested' }}"
      api_connectivity: "{{ __tailscale_api_connectivity.status | default('not_tested') if __tailscale_api_connectivity is defined else 'not_tested' }}"
      http_proxy: "{{ ansible_env.HTTP_PROXY | default(ansible_env.http_proxy) | default('none') }}"
      https_proxy: "{{ ansible_env.HTTPS_PROXY | default(ansible_env.https_proxy) | default('none') }}"
      no_proxy: "{{ ansible_env.NO_PROXY | default(ansible_env.no_proxy) | default('none') }}"
  when:
    - tailscale_include_network_info | bool

- name: Tailscale | error | Check Tailscale service status
  ansible.builtin.systemd:
    name: "{{ __tailscale_service_name }}"
  register: __tailscale_service_status
  failed_when: false
  when:
    - ansible_facts['service_mgr'] == 'systemd'

- name: Tailscale | error | Check if Tailscale binary exists
  ansible.builtin.stat:
    path: "/usr/bin/tailscale"
  register: __tailscale_binary_check

- name: Tailscale | error | Get Tailscale version if available
  ansible.builtin.command: "/usr/bin/tailscale version"
  register: __tailscale_version_check
  failed_when: false
  changed_when: false
  when:
    - __tailscale_binary_check.stat.exists | default(false)

- name: Tailscale | error | Collect systemd journal logs
  ansible.builtin.command: "journalctl -u {{ __tailscale_service_name }} --lines={{ tailscale_error_log_lines }} --no-pager"
  register: __tailscale_journal_logs
  failed_when: false
  changed_when: false
  when:
    - ansible_facts['service_mgr'] == 'systemd'
    - tailscale_error_log_lines > 0

- name: Tailscale | error | Collect system logs
  ansible.builtin.command: "tail -n {{ tailscale_error_log_lines }} /var/log/syslog"
  register: __tailscale_syslog
  failed_when: false
  changed_when: false
  when:
    - tailscale_error_log_lines > 0
    - ansible_facts['os_family'] == 'Debian'

- name: Tailscale | error | Generate comprehensive error report
  ansible.builtin.set_fact:
    __tailscale_error_report_full:
      report_info:
        timestamp: "{{ __tailscale_error_report.report_timestamp }}"
        role_version: "{{ __tailscale_error_report.role_version }}"
        ansible_version: "{{ ansible_version.full }}"
        failed_task: "{{ __tailscale_error_report.failed_task }}"
        error_message: "{{ __tailscale_error_report.error_message }}"
        target_host: "{{ inventory_hostname }}"
      system: "{{ __tailscale_system_diagnostics }}"
      packages: "{{ __tailscale_package_diagnostics | default({}) }}"
      network: "{{ __tailscale_network_diagnostics | default({}) }}"
      service:
        binary_exists: "{{ __tailscale_binary_check.stat.exists | default(false) }}"
        binary_path: "{{ __tailscale_binary_check.stat.path | default('not_found') }}"
        version: "{{ __tailscale_version_check.stdout | default('not_available') if __tailscale_version_check is defined else 'not_available' }}"
        service_status: "{{ __tailscale_service_status | default({}) }}"
      role_configuration:
        track: "{{ tailscale_track }}"
        apt_key_type: "{{ tailscale_apt_key_type }}"
        install_method: "{{ tailscale_install_method }}"
        service_enabled: "{{ tailscale_service_enabled }}"
        systemctl_start: "{{ tailscale_systemctl_start }}"
        auth_key_provided: "{{ 'yes' if tailscale_auth_key | length > 0 else 'no' }}"
        extra_args: "{{ (tailscale_extra_args | regex_replace('--authkey[= ]\\S+', '--authkey=****')) if (tailscale_extra_args | length > 0) else '' }}"
      repository:
        existing_repos: "{{ __tailscale_existing_repos.files | default([]) | map(attribute='path') | list }}"
        existing_keys: "{{ __tailscale_existing_keys.files | default([]) | map(attribute='path') | list }}"
        repo_key_url: "{{ __tailscale_os_repo_key_url }}"
        repo_list_url: "{{ __tailscale_os_repo_list_url }}"
      logs:
        journal: "{{ __tailscale_journal_logs.stdout | default('not_collected') if __tailscale_journal_logs is defined else 'not_available' }}"
        syslog: "{{ __tailscale_syslog.stdout | default('not_collected') if __tailscale_syslog is defined else 'not_available' }}"

- name: Tailscale | error | Display detailed error report
  ansible.builtin.debug:
    msg:
      - "TAILSCALE ROLE ERROR REPORT"
      - "{{ __tailscale_error_report_full.report_info.timestamp }}"
      - "Task: {{ __tailscale_error_report_full.report_info.failed_task }}"
      - "Error: {{ __tailscale_error_report_full.report_info.error_message }}"
      - "System: {{ __tailscale_error_report_full.system.os_info.distribution }} {{ __tailscale_error_report_full.system.os_info.version }}"
      - "Include this report when contacting support"

- name: Tailscale | error | Save error report to file
  ansible.builtin.copy:
    content: "{{ __tailscale_error_report_full | to_nice_yaml }}"
    dest: "/tmp/tailscale-role-error-{{ ansible_facts['date_time'].epoch }}.yaml"
    mode: '0644'
  delegate_to: localhost
  when:
    - tailscale_enhanced_error_reporting | bool
