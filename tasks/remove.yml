---
# Tailscale Remove — Clean uninstall of Tailscale and all configuration.

- name: Tailscale | remove | Stop and disable service (systemd)
  become: true
  ansible.builtin.systemd:
    name: "{{ __tailscale_service_name }}"
    state: stopped
    enabled: false
    daemon_reload: true
  when:
    - ansible_facts['service_mgr'] == 'systemd'

- name: Tailscale | remove | Remove apt repository (signed-by)
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ __tailscale_os_repo_key_path }}] https://pkgs.tailscale.com/{{ tailscale_track }}/{{ ansible_facts['distribution'] | lower }} {{ __tailscale_version_codename }} main"
    filename: tailscale
    state: absent
  when:
    - ansible_facts['os_family'] == 'Debian'

- name: Tailscale | remove | Remove repository keyring (Debian)
  become: true
  ansible.builtin.file:
    path: "{{ __tailscale_os_repo_key_path }}"
    state: absent
  when:
    - ansible_facts['os_family'] == 'Debian'

- name: Tailscale | remove | Remove DNF repository (RedHat)
  become: true
  ansible.builtin.yum_repository:
    name: tailscale-stable
    state: absent
  when:
    - ansible_facts['os_family'] == 'RedHat'

- name: Tailscale | remove | Remove RPM GPG key (RedHat)
  become: true
  ansible.builtin.rpm_key:
    key: "{{ __tailscale_os_repo_key_url }}"
    state: absent
  failed_when: false
  when:
    - ansible_facts['os_family'] == 'RedHat'

- name: Tailscale | remove | Remove tailscale package
  become: true
  ansible.builtin.package:
    name: tailscale
    state: absent

- name: Tailscale | remove | Remove rsyslog configuration
  become: true
  ansible.builtin.file:
    path: "/etc/rsyslog.d/{{ tailscale_rsyslog_config_file }}"
    state: absent

- name: Tailscale | remove | Remove logrotate configuration
  become: true
  ansible.builtin.file:
    path: "/etc/logrotate.d/tailscale"
    state: absent

- name: Tailscale | remove | Remove systemd logging override
  become: true
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ __tailscale_service_name }}.service.d/logging.conf"
    state: absent
  when:
    - ansible_facts['service_mgr'] == 'systemd'

- name: Tailscale | remove | Reload systemd if needed
  become: true
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - ansible_facts['service_mgr'] == 'systemd'

- name: Tailscale | remove | Optionally remove log directory
  become: true
  ansible.builtin.file:
    path: "{{ tailscale_log_dir }}"
    state: absent
  when:
    - tailscale_enable_logging | bool
