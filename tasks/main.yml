---
# Tailscale Main — Orchestrates role execution in order.
# Flow: vars → validate → assert → OS check → prereqs → repo → install → service → logging → auth → remove

- name: Tailscale | include_vars | Gather OS specific variables
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files:
        - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_major_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_major_version'].split('.')[0] }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
        - "main.yml"
      paths:
        - "{{ role_path }}/vars"
  tags:
    - always
    - setup
    - init

- name: Tailscale | validate | Perform comprehensive system validation
  ansible.builtin.include_tasks: validate.yml
  when:
    - tailscale_validate_system | bool
    - tailscale_state | lower != 'absent'
  tags:
    - always
    - validate
    - setup
    - init

- name: Tailscale | assert | Validate all role variables
  ansible.builtin.include_tasks: assert.yml
  tags:
    - always
    - validate
    - setup
    - init

- name: Tailscale | assert | Check if OS is supported
  ansible.builtin.assert:
    that:
      - >-
        (ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] == '24.04') or
        (ansible_facts['distribution'] == 'Debian' and ansible_facts['distribution_major_version'] == '13') or
        (ansible_facts['distribution'] == 'Debian' and ansible_facts['distribution_major_version'] == '12')
    fail_msg: "This role only supports Ubuntu 24.04 and Debian 13/12"
    success_msg: "Running on supported OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
  tags:
    - always
    - setup
    - init

- name: Tailscale | prerequisites | Verify system prerequisites
  ansible.builtin.include_tasks: prerequisites.yml
  when:
    - tailscale_state | lower != 'absent'
  tags:
    - install
    - requirements
    - setup

- name: Tailscale | repository | Configure package repositories
  ansible.builtin.include_tasks: repository.yml
  when:
    - tailscale_state | lower != 'absent'
  tags:
    - requirements
    - setup

- name: Tailscale | install | Install Tailscale package
  ansible.builtin.include_tasks: install.yml
  when:
    - tailscale_state | lower != 'absent'
  tags:
    - install
    - setup

- name: Tailscale | service | Configure Tailscale service startup
  ansible.builtin.include_tasks: service.yml
  when:
    - tailscale_state | lower != 'absent'
  tags:
    - configure
    - setup

- name: Tailscale | logging | Configure dedicated logging
  ansible.builtin.include_tasks: logging.yml
  when:
    - tailscale_state | lower != 'absent'
    - tailscale_enable_logging | bool
  tags:
    - configure
    - setup

- name: Tailscale | auth | Check current authentication status
  ansible.builtin.command: tailscale status
  register: __tailscale_auth_status
  failed_when: false
  changed_when: false
  when:
    - tailscale_state | lower != 'absent'

# Authentication uses no_log to avoid leaking auth keys
- name: Tailscale | command | Authenticate with Tailscale network
  become: true
  no_log: true
  ansible.builtin.command: >
    tailscale up --authkey={{ tailscale_auth_key | quote }} {{ tailscale_extra_args }}
  register: __tailscale_up_result
  changed_when: "'Success' in __tailscale_up_result.stdout"
  failed_when:
    - __tailscale_up_result.rc != 0
    - "'already authenticated' not in __tailscale_up_result.stderr"
  when:
    - tailscale_state | lower != 'absent'
    - tailscale_auth_key is defined
    - tailscale_auth_key | length > 0
    - not ansible_check_mode
    - __tailscale_auth_status.rc is not defined or __tailscale_auth_status.rc != 0
  tags:
    - configure
    - setup

- name: Tailscale | state | Handle absent state
  ansible.builtin.include_tasks: remove.yml
  when:
    - tailscale_state | lower == 'absent'
  tags:
    - always
    - init
    - configure
    - install
