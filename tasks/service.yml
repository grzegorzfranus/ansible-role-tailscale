---
# Tailscale Service — Configure service startup and management.

- name: Tailscale | service | Detect optimal service manager
  ansible.builtin.set_fact:
    __tailscale_service_manager_detected: >-
      {%- if tailscale_service_manager == 'auto' -%}
        {{ ansible_facts['service_mgr'] }}
      {%- else -%}
        {{ tailscale_service_manager }}
      {%- endif -%}

- name: Tailscale | service | Display service management configuration
  ansible.builtin.debug:
    msg:
      - "🔧 Service: {{ __tailscale_service_name }} via {{ __tailscale_service_manager_detected }}"
      - "   Enabled: {{ tailscale_service_enabled }} | Immediate: {{ __tailscale_detected_immediate_start }}"
    verbosity: 1

- name: Tailscale | service | Configure Tailscale service startup (systemd)
  become: true
  ansible.builtin.systemd:
    name: "{{ __tailscale_service_name }}"
    enabled: "{{ tailscale_service_enabled }}"
    daemon_reload: true
  notify: Tailscale | handlers | Restart Tailscale service
  when:
    - __tailscale_service_manager_detected == 'systemd'

- name: Tailscale | service | Start service immediately (Special Distributions)
  become: true
  ansible.builtin.systemd:
    name: "{{ __tailscale_service_name }}"
    state: started
    enabled: true
  when:
    - __tailscale_service_manager_detected == 'systemd'
    - __tailscale_detected_immediate_start | bool
    - tailscale_service_enabled | bool

- name: Tailscale | service | Verify service configuration (systemd)
  ansible.builtin.systemd:
    name: "{{ __tailscale_service_name }}"
  register: __tailscale_service_status
  failed_when: false
  when:
    - __tailscale_service_manager_detected == 'systemd'

- name: Tailscale | service | Report service configuration status
  ansible.builtin.debug:
    msg:
      - "✅ Service {{ __tailscale_service_name }}: {{ __tailscale_service_status.status.ActiveState | default('unknown') }}"
    verbosity: 1
  when:
    - tailscale_collect_system_info | bool

- name: Tailscale | service | Handle service configuration errors
  ansible.builtin.include_tasks: error_reporting.yml
  when:
    - tailscale_enhanced_error_reporting | bool
    - __tailscale_service_status is defined
    - __tailscale_service_status.failed | default(false)
