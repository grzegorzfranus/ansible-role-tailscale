---
# Tailscale Prerequisites — Install required packages before Tailscale setup.

- name: Tailscale | prerequisites | Merge user and OS-specific package lists
  ansible.builtin.set_fact:
    __tailscale_merged_prerequisites: >-
      {{ (tailscale_prerequisites + __tailscale_os_prerequisites | default([])) | unique }}

- name: Tailscale | prerequisites | Validate merged prerequisites list
  ansible.builtin.assert:
    that:
      - __tailscale_merged_prerequisites | length > 0
    fail_msg: "❌ Prerequisites list is empty or undefined"
    success_msg: "✅ Prerequisites list validated: {{ __tailscale_merged_prerequisites | join(', ') }}"

- name: Tailscale | prerequisites | Display prerequisites to install
  ansible.builtin.debug:
    msg:
      - "📦 Installing Tailscale Prerequisites:"
      - "   Packages: {{ __tailscale_merged_prerequisites | join(', ') }}"
      - "   Package Manager: {{ ansible_facts['pkg_mgr'] }}"
    verbosity: 1

- name: Tailscale | prerequisites | Install required packages
  become: true
  ansible.builtin.package:
    name: "{{ __tailscale_merged_prerequisites }}"
    state: present
    update_cache: true
  register: __tailscale_package_install_result
  until: __tailscale_package_install_result is succeeded
  retries: 3
  delay: 5

- name: Tailscale | prerequisites | Verify package installation
  ansible.builtin.command: "which {{ item }}"
  register: __tailscale_package_verification
  failed_when: false
  changed_when: false
  loop: "{{ __tailscale_merged_prerequisites }}"
  when:
    - item in ['curl', 'wget', 'gnupg', 'gpg']

- name: Tailscale | prerequisites | Report installation status
  ansible.builtin.debug:
    msg:
      - "✅ Prerequisites: {{ __tailscale_merged_prerequisites | length }} packages installed"
    verbosity: 1
  when:
    - tailscale_collect_system_info | bool

- name: Tailscale | prerequisites | Handle installation errors
  ansible.builtin.include_tasks: error_reporting.yml
  when:
    - tailscale_enhanced_error_reporting | bool
    - __tailscale_package_install_result is defined
    - __tailscale_package_install_result.failed | default(false)
