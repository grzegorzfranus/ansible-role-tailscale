---
# Tailscale Install — Install the Tailscale package and verify binaries.

- name: Tailscale | install | Check if Tailscale is already installed
  ansible.builtin.command: "tailscale version"
  register: __tailscale_existing_version
  failed_when: false
  changed_when: false

- name: Tailscale | install | Display pre-installation status
  ansible.builtin.debug:
    msg:
      - "Currently Installed: {{ 'Yes - ' + __tailscale_existing_version.stdout if __tailscale_existing_version.rc == 0 else 'No' }}"
      - "   Method: {{ tailscale_install_method }} | Track: {{ tailscale_track }}"
    verbosity: 1

- name: Tailscale | install | Install Tailscale package
  become: true
  ansible.builtin.package:
    name: tailscale
    state: present
    update_cache: true
  register: __tailscale_installation_result
  until: __tailscale_installation_result is succeeded
  retries: 3
  delay: 10

- name: Tailscale | install | Verify Tailscale installation
  ansible.builtin.command: "tailscale version"
  register: __tailscale_installed_version
  changed_when: false
  failed_when: __tailscale_installed_version.rc != 0

- name: Tailscale | install | Check Tailscale daemon binary
  ansible.builtin.stat:
    path: "/usr/sbin/tailscaled"
  register: __tailscale_daemon_binary

- name: Tailscale | install | Verify tailscale binary permissions
  ansible.builtin.stat:
    path: "/usr/bin/tailscale"
  register: __tailscale_client_binary

- name: Tailscale | install | Report installation results
  ansible.builtin.debug:
    msg:
      - "Tailscale {{ __tailscale_installed_version.stdout }} installed"
      - "   Changed: {{ 'Yes' if __tailscale_installation_result.changed else 'No (already installed)' }}"
    verbosity: 1
  when:
    - tailscale_collect_system_info | bool

- name: Tailscale | install | Store installation information
  ansible.builtin.set_fact:
    __tailscale_installation_info:
      version: "{{ __tailscale_installed_version.stdout }}"
      installation_changed: "{{ __tailscale_installation_result.changed }}"
      client_binary_path: "/usr/bin/tailscale"
      daemon_binary_path: "/usr/sbin/tailscaled"
      client_binary_exists: "{{ __tailscale_client_binary.stat.exists }}"
      daemon_binary_exists: "{{ __tailscale_daemon_binary.stat.exists }}"
      installation_method: "{{ tailscale_install_method }}"
      track: "{{ tailscale_track }}"
      timestamp: "{{ ansible_facts['date_time'].iso8601 }}"
  when:
    - tailscale_collect_system_info | bool

- name: Tailscale | install | Handle installation errors
  ansible.builtin.include_tasks: error_reporting.yml
  when:
    - tailscale_enhanced_error_reporting | bool
    - >-
      (__tailscale_installation_result is defined and __tailscale_installation_result.failed | default(false)) or
      (__tailscale_installed_version is defined and __tailscale_installed_version.failed | default(false)) or
      (not __tailscale_client_binary.stat.exists) or
      (not __tailscale_daemon_binary.stat.exists)
